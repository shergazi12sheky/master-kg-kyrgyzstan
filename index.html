<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Илбирс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0b0b0b;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0,0,0,0.8);
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .logo span {
            color: #d4af37;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #d4af37;
        }

        /* ============================================= */
        /* БУЛ ЖЕРДЕ ФОНГО СҮРӨТ КОШУЛДУ */
        /* ============================================= */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            /* 🖼️ ФОН СҮРӨТҮ - МИНЕ УШУЛ ЖЕРДЕ */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url("images/ilbirs-bg.jpg");
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
        }

        /* Эгерде сүрөт жок болсо, түс көрүнсүн */
        .hero h1 {
            font-size: 80px;
            color: white;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .hero h1 span {
            color: #d4af37;
        }

        .hero p {
            font-size: 24px;
            color: #ddd;
            margin-top: 10px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            background: #d4af37;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
            color: black;
            margin-top: 30px;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #e6c84c;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        .btn-whatsapp:hover {
            background: #1da851;
        }

        footer {
            padding: 20px;
            text-align: center;
            background: #111;
            color: #888;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }
            .hero h1 {
                font-size: 45px;
            }
            .hero p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🐆 <span>Илбирс</span></div>
        <nav>
            <a href="#">Башкы</a>
            <a href="#">Кызматтар</a>
            <a href="#">Байланыш</a>
        </nav>
    </header>

    <!-- ============================================= -->
    <!-- БУЛ ЖЕРДЕ "ИЛБИРС" ДЕП ЖАЗЫЛГАН -->
    <!-- ============================================= -->
    <section class="hero">
        <h1>🐆 <span>Илбирс</span></h1>
        <p>Күч, Ылдамдык, Ишеним</p>
        <a href="https://wa.me/996707901214?text=Салам!%20Илбирс%20сайтынан%20көрүп%20жазам" 
           class="btn btn-whatsapp" 
           target="_blank">
           📱 WhatsApp аркылуу байланышуу
        </a>
    </section>

    <footer>
        <p>&copy; 2026 Илбирс. Бардык укуктар корголгон.</p>
    </footer>

</body>
</html>
